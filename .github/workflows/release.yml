name: Release Windows .exe

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vd: v0.1.0). Để trống nếu chỉ build artifact."
        required: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Write .env (anon key is public, safe to embed)
        working-directory: app
        shell: bash
        run: |
          {
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-https://pybmkjhfwxurrlwxhdxo.supabase.co}"
            echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5Ym1ramhmd3h1cnJsd3hoZHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzYzMzQsImV4cCI6MjA5Mjc1MjMzNH0.EkafAmCpfXxg0N-deg5kcuYrF3LIIOlRJbl-CYuhus8}"
          } > .env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      # Builds the app, signs the updater bundle (.nsis.zip + .sig) using the
      # private key stored in GitHub Secrets, attaches everything to a GitHub
      # Release, and emits the `latest.json` manifest the in-app updater reads.
      - name: Build & release with tauri-action
        id: tauri
        if: steps.tag.outputs.value != ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: ${{ steps.tag.outputs.value }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      # tauri-action tạo .nsis.zip bằng PowerShell Compress-Archive (Deflate64).
      # tauri-plugin-updater chỉ hỗ trợ Deflate tiêu chuẩn (ZIP 2.0).
      # Bước này repack lại bằng 7-Zip (có sẵn trên windows-latest runner)
      # để đảm bảo compression method = Deflate, sau đó ký lại bằng Tauri CLI.
      - name: Repack .nsis.zip with standard Deflate (fix Deflate64 incompatibility)
        if: steps.tag.outputs.value != ''
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $bundle = "app/src-tauri/target/release/bundle/nsis"
          $zip = Get-ChildItem "$bundle/*.nsis.zip" | Select-Object -First 1
          if (-not $zip) { Write-Host "No .nsis.zip found, skipping repack"; exit 0 }

          $tmpDir = "$bundle/repack_tmp"
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null

          # Extract with 7-Zip
          & "C:\Program Files\7-Zip\7z.exe" x $zip.FullName -o"$tmpDir" -y

          # Repack with Deflate (not Deflate64) — method=Deflate, level=5
          $newZip = $zip.FullName
          Remove-Item $newZip -Force
          & "C:\Program Files\7-Zip\7z.exe" a -tzip -mm=Deflate -mx=5 $newZip "$tmpDir\*"
          Remove-Item $tmpDir -Recurse -Force

          # Re-sign: TAURI_SIGNING_PRIVATE_KEY env var is already set above,
          # tauri-plugin-updater signer reads it automatically.
          $sigFile = "$newZip.sig"
          Remove-Item $sigFile -ErrorAction SilentlyContinue
          $absZip = (Resolve-Path $newZip).Path
          Push-Location app
          pnpm tauri signer sign $absZip
          Pop-Location

          # Patch latest.json signature field with the new .sig content
          $latestJson = "$bundle/latest.json"
          if (Test-Path $latestJson) {
            $newSig = (Get-Content "$newZip.sig" -Raw).Trim()
            $json = Get-Content $latestJson -Raw | ConvertFrom-Json
            foreach ($platform in $json.platforms.PSObject.Properties) {
              $platform.Value.signature = $newSig
            }
            $json | ConvertTo-Json -Depth 10 | Set-Content $latestJson -Encoding UTF8NoBOM
          }

      # Re-upload the patched latest.json and repacked .nsis.zip to the release
      - name: Upload repacked assets to GitHub Release
        if: steps.tag.outputs.value != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            app/src-tauri/target/release/bundle/nsis/latest.json
      # without a tag — keeps the existing "just build an artifact" behaviour.
      - name: Build only (no release)
        if: steps.tag.outputs.value == ''
        working-directory: app
        run: pnpm tauri build

      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
