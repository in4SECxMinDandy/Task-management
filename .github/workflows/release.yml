name: Release Windows .exe

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vd: v0.1.0). Để trống nếu chỉ build artifact."
        required: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env (anon key is public, safe to embed)
        shell: bash
        run: |
          {
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-https://pybmkjhfwxurrlwxhdxo.supabase.co}"
            echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5Ym1ramhmd3h1cnJsd3hoZHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzYzMzQsImV4cCI6MjA5Mjc1MjMzNH0.EkafAmCpfXxg0N-deg5kcuYrF3LIIOlRJbl-CYuhus8}"
          } > .env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Tauri (Windows .exe + .msi)
        run: pnpm tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: app/src-tauri/target/release/bundle/nsis/*.exe

      - name: Create GitHub Release and attach installers
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || inputs.tag }}
          name: ${{ github.ref_name != '' && github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: app/src-tauri/target/release/bundle/nsis/*.exe
