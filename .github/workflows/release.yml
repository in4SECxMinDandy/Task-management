name: Release Windows .exe

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vd: v0.1.0). Để trống nếu chỉ build artifact."
        required: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Write .env (anon key is public, safe to embed)
        working-directory: app
        shell: bash
        run: |
          {
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-https://pybmkjhfwxurrlwxhdxo.supabase.co}"
            echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5Ym1ramhmd3h1cnJsd3hoZHhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzYzMzQsImV4cCI6MjA5Mjc1MjMzNH0.EkafAmCpfXxg0N-deg5kcuYrF3LIIOlRJbl-CYuhus8}"
          } > .env
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      # Builds the app, signs the updater bundle (.nsis.zip + .sig) using the
      # private key stored in GitHub Secrets, attaches everything to a GitHub
      # Release, and emits the `latest.json` manifest the in-app updater reads.
      - name: Build & release with tauri-action
        id: tauri
        if: steps.tag.outputs.value != ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: ${{ steps.tag.outputs.value }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      # Fallback build (no signing, no updater manifest) when triggered manually
      # without a tag — keeps the existing "just build an artifact" behaviour.
      - name: Build only (no release)
        if: steps.tag.outputs.value == ''
        working-directory: app
        run: pnpm tauri build

      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip
            app/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
